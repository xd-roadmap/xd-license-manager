name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            'https://utpzjisibwkdvoxjkwxx.supabase.co/rest/v1/licenses?select=id&limit=1' \
            -H 'apikey: ${{ secrets.SUPABASE_ANON_KEY }}' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}')
          echo "Response code: $response"
          if [ $response -eq 200 ]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Something went wrong: $response"
            exit 1
          fi

      - name: Keep repo active (prevent 60-day freeze)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "last ping: $(date -u)" > .github/keep-alive.txt
          git add .github/keep-alive.txt
          git commit -m "chore: keep alive $(date -u '+%Y-%m-%d')"
          git push
